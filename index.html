<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boris | Executive Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=Inter:wght@300;400;500;600&family=Montserrat:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        .theme-midnight { --bg: #0f172a; --bg-card: rgba(30, 41, 59, 0.4); --border: #1e293b; --border-hover: #334155; --text: #f1f5f9; --text-muted: #94a3b8; --accent: #10b981; --shimmer: linear-gradient(90deg, transparent, rgba(16, 185, 129, 0.25), transparent); }
        .theme-slate-luxury { --bg: #0b0f19; --bg-card: rgba(17, 24, 39, 0.4); --border: rgba(255, 255, 255, 0.04); --border-hover: rgba(255, 255, 255, 0.12); --text: #f3f4f6; --text-muted: #9ca3af; --accent: #f3f4f6; --shimmer: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent); }
        .theme-old-money { --bg: #111810; --bg-card: rgba(24, 36, 22, 0.3); --border: rgba(212, 175, 55, 0.08); --border-hover: rgba(212, 175, 55, 0.3); --text: #f4f4f0; --text-muted: #8a9688; --accent: #d4af37; --shimmer: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.35), transparent); }
        .theme-cyber { --bg: #050505; --bg-card: rgba(20, 20, 20, 0.8); --border: #ff0055; --border-hover: #ff0055; --text: #ffffff; --text-muted: #888888; --accent: #00ffcc; --shimmer: linear-gradient(90deg, transparent, rgba(0, 255, 204, 0.45), transparent); }
        .theme-noir-absolu { --bg: #000000; --bg-card: #0a0a0a; --border: #1a1a1a; --border-hover: #333333; --text: #ffffff; --text-muted: #666666; --accent: #ffffff; --shimmer: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.12), transparent); }

        #preview-zone { background-color: var(--bg); color: var(--text); transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .custom-muted { color: var(--text-muted); }
        .custom-border { border-color: var(--border); }
        .custom-accent { color: var(--accent); }
        .custom-icon-bg { background: var(--border-hover); }

        .custom-card { background-color: var(--bg-card); border: 1px solid var(--border); transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); position: relative; overflow: hidden; }
        .custom-card:hover { border-color: var(--border-hover); transform: translateY(-2px); box-shadow: 0 12px 24px -10px rgba(0, 0, 0, 0.6); }

        .shimmer-layer { position: absolute; top: 0; left: -150%; width: 100%; height: 100%; background: var(--shimmer); transform: skewX(-20deg); pointer-events: none; animation: continuous-shimmer 4s infinite cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        @keyframes continuous-shimmer { 0% { left: -150%; } 20% { left: 150%; } 100% { left: 150%; } }

        .font-jakarta { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-inter { font-family: 'Inter', sans-serif; }
        .font-montserrat { font-family: 'Montserrat', sans-serif; }
        .font-playfair { font-family: 'Playfair Display', serif; }
        .font-garamond { font-family: 'Cormorant Garamond', serif; letter-spacing: -0.01em; }
        .font-fraunces { font-family: 'Fraunces', serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }

        #admin-panel { transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease; }
    </style>
</head>
<body class="bg-[#070a12] text-slate-200 min-h-screen flex flex-col md:flex-row relative overflow-x-hidden antialiased">

    <aside id="admin-panel" class="fixed inset-y-0 left-0 w-80 md:w-96 bg-[#0f1626] border-r border-slate-800/60 p-6 space-y-6 overflow-y-auto max-h-screen z-40 transform -translate-x-full opacity-0 hidden">
        <div class="flex justify-between items-center pt-2">
            <div>
                <h2 class="text-lg font-semibold text-white tracking-tight">Studio Nuage</h2>
                <p class="text-xs text-slate-400">Modifications synchronisées en temps réel.</p>
            </div>
            <button id="close-admin-btn" class="text-slate-400 hover:text-white cursor-pointer p-1"><i class="fa-solid fa-xmark text-lg"></i></button>
        </div>

        <div class="space-y-4">
            <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Identité & Design</h3>
            <div>
                <label class="block text-[11px] text-slate-400 font-medium mb-1.5">Thème Sombre</label>
                <select id="theme-selector" class="w-full bg-slate-900 border border-slate-800 rounded-lg p-2.5 text-xs text-white focus:outline-none">
                    <option value="theme-midnight">Midnight</option>
                    <option value="theme-slate-luxury">Slate Luxury</option>
                    <option value="theme-old-money">Old Money</option>
                    <option value="theme-cyber">Cyberpunk</option>
                    <option value="theme-noir-absolu">Noir Absolu</option>
                </select>
            </div>
            <div>
                <label class="block text-[11px] text-slate-400 font-medium mb-1.5">Typographie</label>
                <select id="font-selector" class="w-full bg-slate-900 border border-slate-800 rounded-lg p-2.5 text-xs text-white focus:outline-none">
                    <option value="font-jakarta">Plus Jakarta Sans</option>
                    <option value="font-inter">Inter</option>
                    <option value="font-montserrat">Montserrat</option>
                    <option value="font-playfair">Playfair Display</option>
                    <option value="font-mono">JetBrains Mono</option>
                    <option value="font-garamond">Cormorant Garamond</option>
                </select>
            </div>
        </div>

        <div class="space-y-4">
            <div class="flex justify-between items-center">
                <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Architecture des Liens</h3>
                <button id="add-link-btn" class="text-[11px] bg-white text-slate-950 font-medium px-2.5 py-1 rounded-md hover:bg-slate-200">
                    <i class="fa-solid fa-plus mr-1"></i> Ajouter
                </button>
            </div>
            <div id="links-editor-list" class="space-y-3"></div>
        </div>

        <button onclick="pushStateToCloud()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-medium py-2.5 px-4 rounded-xl text-xs transition flex items-center justify-center gap-2">
            <i class="fa-solid fa-cloud-arrow-up"></i> Forcer la Synchronisation
        </button>
    </aside>

    <section id="preview-zone" class="flex-1 min-h-screen flex flex-col justify-between p-8 sm:p-16 theme-slate-luxury font-jakarta w-full">
        <div class="max-w-xl w-full mx-auto pt-16">
            <header class="text-center mb-16">
                <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-transparent border custom-border text-xl font-light text-white mb-4">B</div>
                <h1 id="preview-name" class="text-2xl font-medium tracking-tight text-white cursor-default select-none">Boris</h1>
                <p class="text-xs custom-muted mt-1.5 uppercase tracking-[0.2em] font-medium">Conseil & Stratégie</p>
                <div class="h-px w-8 bg-current opacity-20 mx-auto mt-6"></div>
            </header>
            <div id="preview-links-container" class="space-y-4"></div>
        </div>
        <footer class="text-center text-[11px] custom-muted tracking-widest uppercase pt-16 opacity-60">
            <p>&copy; 2026 Boris. Tous droits réservés.</p>
        </footer>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDYrptPjTv45lJ9P9z-stVgJAN7-P1QNHg",
            authDomain: "linkspx-b7043.firebaseapp.com",
            projectId: "linkspx-b7043",
            storageBucket: "linkspx-b7043.firebasestorage.app",
            messagingSenderId: "550167210912",
            appId: "1:550167210912:web:739fc70f8348f74eeb12c5"
        };

        const ADMIN_PASSWORD = "Admin123spx"; 
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "executive_hub", "boris_profile");

        let appState = {
            theme: 'theme-slate-luxury',
            font: 'font-jakarta',
            links: []
        };

        let clickCount = 0, clickTimeout, isAuthenticated = false;
        const adminPanel = document.getElementById('admin-panel'), triggerName = document.getElementById('preview-name');

        // ÉCOUTEUR CLOUD
        onSnapshot(docRef, (docSnap) => {
            if (docSnap.exists()) {
                appState = docSnap.data();
                renderPreview();
                if (!adminPanel.classList.contains('hidden')) renderEditors();
            } else { setDoc(docRef, appState); }
        });

        // ACCÈS ADMIN (TRIPLE CLIC)
        triggerName.addEventListener('click', () => {
            clickCount++; clearTimeout(clickTimeout);
            clickTimeout = setTimeout(() => { clickCount = 0; }, 800);
            if (clickCount === 3) { clickCount = 0; verifyIdentityAndOpen(); }
        });

        function verifyIdentityAndOpen() {
            if (!isAuthenticated) {
                if (prompt("Mot de passe Cloud :") === ADMIN_PASSWORD) { isAuthenticated = true; openAdmin(); }
                else { alert("Erreur."); }
            } else openAdmin();
        }

        function openAdmin() { 
            renderEditors(); 
            adminPanel.classList.remove('hidden'); 
            setTimeout(() => adminPanel.classList.remove('-translate-x-full', 'opacity-0'), 10); 
        }

        document.getElementById('close-admin-btn').addEventListener('click', () => { 
            adminPanel.classList.add('-translate-x-full', 'opacity-0'); 
            setTimeout(() => adminPanel.classList.add('hidden'), 400); 
        });

        // SYNCHRONISATION
        async function pushStateToCloud() { 
            if(isAuthenticated) {
                try { await setDoc(docRef, appState); } catch(e) { console.error("Erreur de sauvegarde", e); }
            }
        }

        // RENDU VITRINE
        function renderPreview() {
            document.getElementById('preview-zone').className = `flex-1 min-h-screen flex flex-col justify-between p-8 sm:p-16 ${appState.theme} ${appState.font} w-full`;
            document.getElementById('theme-selector').value = appState.theme;
            document.getElementById('font-selector').value = appState.font;
            const container = document.getElementById('preview-links-container');
            container.innerHTML = '';
            appState.links.forEach((link, i) => {
                const card = document.createElement('a');
                card.href = link.url || '#'; card.target = "_blank";
                card.className = "custom-card group flex items-center justify-between p-5 rounded-xl backdrop-blur-sm shadow-sm";
                card.innerHTML = `
                    <div class="shimmer-layer" style="animation-delay: ${i*0.6}s;"></div>
                    <div class="flex items-center space-x-4 relative z-10">
                        <div class="w-10 h-10 rounded-lg custom-icon-bg flex items-center justify-center custom-accent border border-white/5">
                            <i class="fa-solid ${link.icon || 'fa-link'} text-sm"></i>
                        </div>
                        <div>
                            <h3 class="font-medium text-sm text-white">${link.title}</h3>
                            <p class="text-xs custom-muted font-light">${link.desc || ''}</p>
                        </div>
                    </div>
                    <div class="w-7 h-7 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 bg-white/5 transition-all relative z-10">
                        <i class="fa-solid fa-arrow-right text-xs custom-accent"></i>
                    </div>`;
                container.appendChild(card);
            });
        }

        // RENDU ÉDITEUR
        function renderEditors() {
            const list = document.getElementById('links-editor-list');
            list.innerHTML = '';
            appState.links.forEach((link) => {
                const item = document.createElement('div');
                item.className = "bg-slate-900 border border-slate-800 rounded-xl p-4 space-y-2.5 relative";
                item.innerHTML = `
                    <button class="absolute top-2 right-2 text-slate-500 hover:text-rose-400 cursor-pointer" onclick="window.deleteLink('${link.id}')">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                    <input type="text" placeholder="Titre" value="${link.title}" class="w-full bg-slate-800 text-xs text-white p-1.5 rounded-lg focus:outline-none" onchange="window.updateLink('${link.id}', 'title', this.value)">
                    <input type="text" placeholder="URL" value="${link.url}" class="w-full bg-slate-800 text-xs text-slate-300 p-1.5 rounded-lg focus:outline-none" onchange="window.updateLink('${link.id}', 'url', this.value)">
                    <input type="text" placeholder="Description" value="${link.desc}" class="w-full bg-slate-800 text-xs text-slate-400 p-1.5 rounded-lg focus:outline-none" onchange="window.updateLink('${link.id}', 'desc', this.value)">
                    <select class="w-full bg-slate-800 text-[10px] text-slate-300 p-1.5 rounded-lg" onchange="window.updateLink('${link.id}', 'icon', this.value)">
                        <option value="fa-link" ${link.icon==='fa-link'?'selected':''}>Lien Standard</option>
                        <option value="fa-arrow-trend-up" ${link.icon==='fa-arrow-trend-up'?'selected':''}>Graphique</option>
                        <option value="fa-signature" ${link.icon==='fa-signature'?'selected':''}>Plume</option>
                        <option value="fa-briefcase" ${link.icon==='fa-briefcase'?'selected':''}>Mallette</option>
                        <option value="fa-gem" ${link.icon==='fa-gem'?'selected':''}>Premium</option>
                    </select>`;
                list.appendChild(item);
            });
        }

        // FONCTIONS GLOBALES POUR L'ÉDITEUR
        window.updateLink = (id, field, value) => {
            const link = appState.links.find(x => x.id === id);
            if(link) { 
                link[field] = value; 
                pushStateToCloud(); 
            }
        };

        window.deleteLink = (id) => {
            appState.links = appState.links.filter(x => x.id !== id);
            renderEditors();
            pushStateToCloud();
        };

        document.getElementById('add-link-btn').addEventListener('click', () => {
            if(!isAuthenticated) return;
            const newLink = { id: Date.now().toString(), title: "Nouveau Service", url: "https://", desc: "Description.", icon: "fa-link" };
            appState.links.push(newLink);
            renderEditors();
            pushStateToCloud();
        });

        document.getElementById('theme-selector').addEventListener('change', (e) => { appState.theme = e.target.value; pushStateToCloud(); });
        document.getElementById('font-selector').addEventListener('change', (e) => { appState.font = e.target.value; pushStateToCloud(); });
        window.pushStateToCloud = pushStateToCloud;
    </script>
</body>
</html>
